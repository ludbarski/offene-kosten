<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Offene Kosten</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #910c93;
            --primary-dark: #730a74;
            --bg-card: rgba(255, 255, 255, 0.96);
            --text: #222;
            --muted: #666;
            --border: #e8e8e8;
            --danger: #d84f4f;
            --expense: #c0392b;
            --income: #1f9d55;
            --sale: #8e44ad;
            --success: #4caf50;
            --overdue: #f44336;
            --shadow: 0 12px 36px rgba(0,0,0,0.22);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: #000;
        }

        body {
            background-image: url('hintergrund.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding:
                calc(env(safe-area-inset-top) + 10px)
                10px
                calc(env(safe-area-inset-bottom) + 90px);
        }

        .app {
            max-width: 560px;
            margin: 0 auto;
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border-radius: 26px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        .header {
            background: var(--primary);
            color: #fff;
            padding: 18px 16px 16px;
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .header h1 {
            margin: 0 0 4px;
            font-size: 1.5rem;
            line-height: 1.15;
        }

        .header p {
            margin: 0;
            font-size: 0.98rem;
            opacity: 0.95;
        }

        .btn-export {
            border: 1px solid rgba(255,255,255,0.35);
            background: rgba(255,255,255,0.16);
            color: #fff;
            border-radius: 14px;
            padding: 12px 14px;
            min-height: 46px;
            font-size: 0.96rem;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
        }

        .tabs {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 12px 12px 10px;
            background: #faf7fb;
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar {
            display: none;
        }

        .tab-btn {
            border: none;
            border-radius: 16px;
            background: #efe8f0;
            color: #555;
            padding: 13px 16px;
            min-height: 50px;
            font-size: 0.98rem;
            font-weight: 800;
            cursor: pointer;
            white-space: nowrap;
            flex: 0 0 auto;
        }

        .tab-btn.active {
            background: var(--primary);
            color: #fff;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .panel-hint {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            background: #f8f8f8;
            font-size: 0.98rem;
            line-height: 1.45;
            color: #6e6e6e;
            text-align: center;
        }

        .filter-btns {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            background: #fff;
        }

        .filter-btn {
            flex: 1;
            border: 1px solid #ddd;
            background: #fff;
            color: #444;
            border-radius: 14px;
            min-height: 48px;
            padding: 10px 12px;
            font-size: 0.98rem;
            font-weight: 800;
            cursor: pointer;
        }

        .filter-btn.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .summary-cards,
        .month-cards {
            display: grid;
            gap: 10px;
            padding: 14px;
        }

        .summary-cards {
            grid-template-columns: repeat(2, minmax(0, 1fr));
            border-bottom: 1px solid var(--border);
            background: #fff;
        }

        .month-cards {
            grid-template-columns: 1fr;
            padding-top: 10px;
        }

        .summary-card,
        .month-card {
            background: #fafafa;
            border: 1px solid #ececec;
            border-radius: 18px;
            padding: 12px 14px;
        }

        .summary-card.expense {
            background: #fff3f2;
            border-color: #ffd9d4;
        }

        .summary-card.income {
            background: #eefaf3;
            border-color: #d4f3df;
        }

        .summary-card.neutral {
            background: #f7f4f8;
            border-color: #eadbef;
        }

        .summary-label,
        .month-label {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 700;
        }

        .summary-value {
            font-size: 1.18rem;
            font-weight: 900;
            line-height: 1.2;
        }

        .summary-value.expense,
        .month-value.expense {
            color: var(--expense);
        }

        .summary-value.income,
        .month-value.income {
            color: var(--income);
        }

        .summary-value.sale,
        .month-value.sale {
            color: var(--sale);
        }

        .summary-sub {
            margin-top: 6px;
            font-size: 0.82rem;
            color: #888;
            line-height: 1.35;
        }

        .section-title {
            padding: 14px 14px 6px;
            font-size: 0.98rem;
            font-weight: 900;
            color: #555;
        }

        .terms-section {
            padding: 14px;
            min-height: 220px;
        }

        .terms-empty {
            padding: 38px 16px;
            text-align: center;
            color: #888;
            font-size: 1rem;
        }

        .term-item {
            display: flex;
            gap: 12px;
            align-items: flex-start;
            background: #f8f8f9;
            border-left: 5px solid var(--primary);
            border-radius: 18px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .term-item.completed {
            background: #f1f7f2;
            border-left-color: var(--success);
            opacity: 0.84;
        }

        .term-item.completed .term-title {
            text-decoration: line-through;
            color: #8d8d8d;
        }

        .term-item.overdue {
            background: #fff0f0;
            border-left-color: var(--overdue);
        }

        .term-checkbox {
            width: 24px;
            height: 24px;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .term-content {
            flex: 1;
            min-width: 0;
        }

        .term-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .term-title {
            font-size: 1.06rem;
            font-weight: 800;
            line-height: 1.35;
            word-break: break-word;
        }

        .term-amount {
            font-size: 1rem;
            font-weight: 900;
            white-space: nowrap;
        }

        .term-amount.expense {
            color: var(--expense);
        }

        .term-amount.income {
            color: var(--income);
        }

        .term-amount.sale {
            color: var(--sale);
        }

        .term-meta {
            margin-top: 6px;
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.4;
        }

        .term-note {
            margin-top: 8px;
            font-size: 0.96rem;
            color: #707070;
            line-height: 1.45;
            word-break: break-word;
        }

        .term-source {
            margin-top: 8px;
            font-size: 0.88rem;
            color: #8b8b8b;
            font-weight: 700;
        }

        .badge {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 800;
        }

        .badge.done {
            background: #e6f5ea;
            color: #2e7d32;
        }

        .badge.open {
            background: #f8eefe;
            color: var(--primary);
        }

        .term-delete {
            border: none;
            background: var(--danger);
            color: #fff;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            flex-shrink: 0;
        }

        .month-card {
            background: #fff;
        }

        .month-grid {
            display: grid;
            gap: 6px;
            margin-top: 8px;
        }

        .month-row {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.95rem;
        }

        .month-row strong {
            font-weight: 800;
        }

        .month-empty {
            padding: 0 14px 18px;
            color: #888;
            font-size: 0.95rem;
        }

        .fab {
            position: fixed;
            right: 18px;
            bottom: calc(env(safe-area-inset-bottom) + 18px);
            width: 62px;
            height: 62px;
            border: none;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            font-size: 2rem;
            line-height: 1;
            box-shadow: 0 10px 26px rgba(145, 12, 147, 0.35);
            cursor: pointer;
            z-index: 40;
        }

        .fab.hidden {
            display: none;
        }

        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: none;
            z-index: 90;
        }

        .sheet-backdrop.open {
            display: block;
        }

        .sheet {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
            border-radius: 24px 24px 0 0;
            padding:
                14px
                16px
                calc(env(safe-area-inset-bottom) + 18px);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.2);
            transform: translateY(100%);
            transition: transform 0.22s ease;
            z-index: 100;
            max-width: 560px;
            margin: 0 auto;
        }

        .sheet.open {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 46px;
            height: 5px;
            border-radius: 999px;
            background: #ddd;
            margin: 0 auto 14px;
        }

        .sheet h2 {
            margin: 0 0 14px;
            font-size: 1.24rem;
            color: var(--primary);
        }

        .sheet-hint {
            margin: -4px 0 12px;
            font-size: 0.88rem;
            color: #777;
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.98rem;
            font-weight: 800;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            border: 1px solid #d8d8d8;
            border-radius: 16px;
            padding: 14px 15px;
            font-size: 1.03rem;
            line-height: 1.35;
            font-family: inherit;
            background: #fff;
        }

        .form-group textarea {
            min-height: 92px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(145, 12, 147, 0.12);
        }

        .sheet-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-secondary,
        .btn-primary {
            flex: 1;
            border: none;
            min-height: 52px;
            border-radius: 16px;
            font-size: 1.02rem;
            font-weight: 800;
            cursor: pointer;
        }

        .btn-secondary {
            background: #efefef;
            color: #333;
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        @media (min-width: 430px) {
            .header h1 { font-size: 1.65rem; }
            .term-title { font-size: 1.1rem; }
            .term-meta, .term-note { font-size: 0.98rem; }
            .summary-value { font-size: 1.24rem; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="header-row">
                <div>
                    <h1>💶 Offene Kosten</h1>
                    <p>Ausgaben und Einnahmen im Blick</p>
                </div>
                <button class="btn-export" onclick="exportToPDF()">PDF</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(0, this)">Alle</button>
            <button class="tab-btn" onclick="switchTab(1, this)">Amazon Rate</button>
            <button class="tab-btn" onclick="switchTab(2, this)">Paypal Rate</button>
            <button class="tab-btn" onclick="switchTab(3, this)">Kreditkarte</button>
            <button class="tab-btn" onclick="switchTab(4, this)">Außenstände</button>
            <button class="tab-btn" onclick="switchTab(5, this)">Offene Verkäufe</button>
        </div>

        <div class="tab-content active" data-tab="0">
            <div class="panel-hint">
                Übersicht über alle Register. In „Alle“ werden <strong>Offene Verkäufe</strong> nur in der Liste angezeigt, aber <strong>nicht</strong> in Gesamteinnahmen und Saldo eingerechnet.
            </div>
            <div class="filter-btns">
                <button class="filter-btn active" onclick="setFilter(0, 'all', this)">Alle</button>
                <button class="filter-btn" onclick="setFilter(0, 'pending', this)">Offen</button>
                <button class="filter-btn" onclick="setFilter(0, 'completed', this)">Erledigt</button>
            </div>
            <div class="summary-cards" id="summary0"></div>
            <div class="terms-section" id="termsList0"></div>
            <div class="section-title">Monatsübersicht</div>
            <div class="month-cards" id="monthCards0"></div>
        </div>

        <div class="tab-content" data-tab="1">
            <div class="filter-btns">
                <button class="filter-btn active" onclick="setFilter(1, 'all', this)">Alle</button>
                <button class="filter-btn" onclick="setFilter(1, 'pending', this)">Offen</button>
                <button class="filter-btn" onclick="setFilter(1, 'completed', this)">Erledigt</button>
            </div>
            <div class="summary-cards" id="summary1"></div>
            <div class="terms-section" id="termsList1"></div>
            <div class="section-title">Monatssummen</div>
            <div class="month-cards" id="monthCards1"></div>
        </div>

        <div class="tab-content" data-tab="2">
            <div class="filter-btns">
                <button class="filter-btn active" onclick="setFilter(2, 'all', this)">Alle</button>
                <button class="filter-btn" onclick="setFilter(2, 'pending', this)">Offen</button>
                <button class="filter-btn" onclick="setFilter(2, 'completed', this)">Erledigt</button>
            </div>
            <div class="summary-cards" id="summary2"></div>
            <div class="terms-section" id="termsList2"></div>
            <div class="section-title">Monatssummen</div>
            <div class="month-cards" id="monthCards2"></div>
        </div>

        <div class="tab-content" data-tab="3">
            <div class="filter-btns">
                <button class="filter-btn active" onclick="setFilter(3, 'all', this)">Alle</button>
                <button class="filter-btn" onclick="setFilter(3, 'pending', this)">Offen</button>
                <button class="filter-btn" onclick="setFilter(3, 'completed', this)">Erledigt</button>
            </div>
            <div class="summary-cards" id="summary3"></div>
            <div class="terms-section" id="termsList3"></div>
            <div class="section-title">Monatssummen</div>
            <div class="month-cards" id="monthCards3"></div>
        </div>

        <div class="tab-content" data-tab="4">
            <div class="filter-btns">
                <button class="filter-btn active" onclick="setFilter(4, 'all', this)">Alle</button>
                <button class="filter-btn" onclick="setFilter(4, 'pending', this)">Offen</button>
                <button class="filter-btn" onclick="setFilter(4, 'completed', this)">Erledigt</button>
            </div>
            <div class="summary-cards" id="summary4"></div>
            <div class="terms-section" id="termsList4"></div>
            <div class="section-title">Monatssummen</div>
            <div class="month-cards" id="monthCards4"></div>
        </div>

        <div class="tab-content" data-tab="5">
            <div class="filter-btns">
                <button class="filter-btn active" onclick="setFilter(5, 'all', this)">Alle</button>
                <button class="filter-btn" onclick="setFilter(5, 'pending', this)">Offen</button>
                <button class="filter-btn" onclick="setFilter(5, 'completed', this)">Erledigt</button>
            </div>
            <div class="summary-cards" id="summary5"></div>
            <div class="terms-section" id="termsList5"></div>
            <div class="section-title">Monatssummen</div>
            <div class="month-cards" id="monthCards5"></div>
        </div>
    </div>

    <button class="fab" id="fabBtn" onclick="openSheet()">+</button>

    <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>

    <div class="sheet" id="entrySheet">
        <div class="sheet-handle"></div>
        <h2 id="sheetTitle">Neuer Eintrag</h2>
        <div class="sheet-hint" id="sheetHint"></div>

        <div class="form-group">
            <label for="entryText">Bezeichnung</label>
            <input type="text" id="entryText" placeholder="z. B. Monatsrate, Rückzahlung, Ebay-Verkauf" />
        </div>

        <div class="form-group">
            <label for="entryAmount" id="amountLabel">Betrag in Euro</label>
            <input type="text" id="entryAmount" inputmode="decimal" placeholder="z. B. 49,90" />
        </div>

        <div class="form-group">
            <label for="entryDate">Fällig am</label>
            <input type="date" id="entryDate" />
        </div>

        <div class="form-group">
            <label for="entryNote">Notiz (optional)</label>
            <textarea id="entryNote" placeholder="z. B. Bestellnummer, Ansprechpartner, Plattform ..."></textarea>
        </div>

        <div class="sheet-actions">
            <button class="btn-secondary" onclick="closeSheet()">Abbrechen</button>
            <button class="btn-primary" onclick="saveEntry()">Speichern</button>
        </div>
    </div>

    <script>
        const TAB_CONFIG = [
            { name: 'Alle', kind: 'all', amountRequired: false, includeInTotals: false },
            { name: 'Amazon Rate', kind: 'expense', amountRequired: true, includeInTotals: true },
            { name: 'Paypal Rate', kind: 'expense', amountRequired: true, includeInTotals: true },
            { name: 'Kreditkarte', kind: 'expense', amountRequired: true, includeInTotals: true },
            { name: 'Außenstände', kind: 'income', amountRequired: true, includeInTotals: true },
            { name: 'Offene Verkäufe', kind: 'sale', amountRequired: false, includeInTotals: false }
        ];

        const filters = ['all', 'all', 'all', 'all', 'all', 'all'];
        let currentTab = 0;

        function todayString() {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text || '').replace(/[&<>"']/g, m => map[m]);
        }

        function formatEuro(value) {
            return new Intl.NumberFormat('de-DE', {
                style: 'currency',
                currency: 'EUR'
            }).format(Number(value || 0));
        }

        function parseEuroInput(input) {
            if (!input || !String(input).trim()) return null;

            let value = String(input).trim()
                .replace(/\s/g, '')
                .replace(/€/g, '');

            if (value.includes(',') && value.includes('.')) {
                if (value.lastIndexOf(',') > value.lastIndexOf('.')) {
                    value = value.replace(/\./g, '').replace(',', '.');
                } else {
                    value = value.replace(/,/g, '');
                }
            } else if (value.includes(',')) {
                value = value.replace(/\./g, '').replace(',', '.');
            }

            const num = Number(value);
            return Number.isFinite(num) ? Number(num.toFixed(2)) : null;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('de-DE', {
                weekday: 'short',
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });
        }

        function getMonthKey(dateStr) {
            return String(dateStr).slice(0, 7);
        }

        function formatMonthKey(monthKey) {
            const [year, month] = monthKey.split('-');
            const date = new Date(Number(year), Number(month) - 1, 1);
            return date.toLocaleDateString('de-DE', {
                month: 'long',
                year: 'numeric'
            });
        }

        function isOverdue(dateStr, completed) {
            if (completed) return false;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const d = new Date(dateStr + 'T00:00:00');
            return d < today;
        }

        function getEntries(tabIndex) {
            const data = localStorage.getItem(`costEntries${tabIndex}`);
            return data ? JSON.parse(data) : [];
        }

        function saveEntries(tabIndex, entries) {
            localStorage.setItem(`costEntries${tabIndex}`, JSON.stringify(entries));
        }

        function sortEntries(entries) {
            return [...entries].sort((a, b) => {
                if (a.completed !== b.completed) {
                    return Number(a.completed) - Number(b.completed);
                }
                return new Date(a.date) - new Date(b.date);
            });
        }

        function getAmountClass(kind) {
            if (kind === 'expense') return 'expense';
            if (kind === 'income') return 'income';
            return 'sale';
        }

        function updateFab() {
            const fab = document.getElementById('fabBtn');
            if (currentTab === 0) {
                fab.classList.add('hidden');
            } else {
                fab.classList.remove('hidden');
            }
        }

        function switchTab(tabIndex, btn) {
            currentTab = tabIndex;

            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(tab => tab.classList.remove('active'));

            document.querySelector(`[data-tab="${tabIndex}"]`).classList.add('active');
            btn.classList.add('active');

            updateFab();
            renderEverything();
        }

        function setFilter(tabIndex, filter, btn) {
            filters[tabIndex] = filter;
            const group = document.querySelector(`[data-tab="${tabIndex}"] .filter-btns`);
            group.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderEverything();
        }

        function openSheet() {
            if (currentTab === 0) return;

            const config = TAB_CONFIG[currentTab];
            document.getElementById('sheetTitle').textContent = `Neuer Eintrag – ${config.name}`;
            document.getElementById('entryText').value = '';
            document.getElementById('entryAmount').value = '';
            document.getElementById('entryDate').value = todayString();
            document.getElementById('entryNote').value = '';

            const hint = config.amountRequired
                ? 'Betrag ist erforderlich.'
                : 'Betrag ist optional. Ohne Betrag wird der Eintrag nicht in Summen eingerechnet.';
            document.getElementById('sheetHint').textContent = hint;

            document.getElementById('sheetBackdrop').classList.add('open');
            document.getElementById('entrySheet').classList.add('open');

            setTimeout(() => {
                document.getElementById('entryText').focus();
            }, 120);
        }

        function closeSheet() {
            document.getElementById('sheetBackdrop').classList.remove('open');
            document.getElementById('entrySheet').classList.remove('open');
        }

        function saveEntry() {
            if (currentTab === 0) return;

            const config = TAB_CONFIG[currentTab];
            const title = document.getElementById('entryText').value.trim();
            const amountRaw = document.getElementById('entryAmount').value.trim();
            const amount = parseEuroInput(amountRaw);
            const date = document.getElementById('entryDate').value;
            const note = document.getElementById('entryNote').value.trim();

            if (!title) {
                alert('Bitte eine Bezeichnung eintragen.');
                return;
            }

            if (!date) {
                alert('Bitte ein Fälligkeitsdatum eintragen.');
                return;
            }

            if (amountRaw && amount === null) {
                alert('Bitte einen gültigen Betrag eingeben, z. B. 49,90.');
                return;
            }

            if (config.amountRequired && amount === null) {
                alert('Bitte einen Betrag eingeben.');
                return;
            }

            const entries = getEntries(currentTab);
            entries.push({
                id: Date.now(),
                title,
                amount,
                date,
                note,
                completed: false,
                createdAt: new Date().toISOString()
            });

            saveEntries(currentTab, entries);
            closeSheet();
            renderEverything();
        }

        function toggleCompleted(tabIndex, id) {
            const entries = getEntries(tabIndex);
            const entry = entries.find(e => e.id === id);
            if (!entry) return;

            entry.completed = !entry.completed;
            saveEntries(tabIndex, entries);
            renderEverything();
        }

        function deleteEntry(tabIndex, id) {
            const entries = getEntries(tabIndex).filter(e => e.id !== id);
            saveEntries(tabIndex, entries);
            renderEverything();
        }

        function getAllListEntries() {
            let all = [];
            for (let i = 1; i <= 5; i++) {
                const config = TAB_CONFIG[i];
                getEntries(i).forEach(entry => {
                    all.push({
                        ...entry,
                        sourceTab: i,
                        kind: config.kind
                    });
                });
            }
            return sortEntries(all);
        }

        function getOverallTotals() {
            const totals = {
                expenseOpen: 0,
                expenseDone: 0,
                incomeOpen: 0,
                incomeDone: 0
            };

            for (let i = 1; i <= 4; i++) {
                const config = TAB_CONFIG[i];
                getEntries(i).forEach(entry => {
                    if (entry.amount == null) return;
                    if (config.kind === 'expense') {
                        if (entry.completed) totals.expenseDone += entry.amount;
                        else totals.expenseOpen += entry.amount;
                    }
                    if (config.kind === 'income') {
                        if (entry.completed) totals.incomeDone += entry.amount;
                        else totals.incomeOpen += entry.amount;
                    }
                });
            }

            return totals;
        }

        function getRegisterTotals(tabIndex) {
            const entries = getEntries(tabIndex);
            let open = 0;
            let done = 0;

            entries.forEach(entry => {
                if (entry.amount == null) return;
                if (entry.completed) done += entry.amount;
                else open += entry.amount;
            });

            return { open, done };
        }

        function getRegisterMonths(tabIndex) {
            const entries = getEntries(tabIndex);
            const map = {};

            entries.forEach(entry => {
                if (entry.amount == null) return;
                const key = getMonthKey(entry.date);
                if (!map[key]) {
                    map[key] = { open: 0, done: 0 };
                }
                if (entry.completed) map[key].done += entry.amount;
                else map[key].open += entry.amount;
            });

            return Object.entries(map)
                .sort((a, b) => b[0].localeCompare(a[0]));
        }

        function getAllMonths() {
            const map = {};

            for (let i = 1; i <= 4; i++) {
                const config = TAB_CONFIG[i];
                getEntries(i).forEach(entry => {
                    if (entry.amount == null) return;

                    const key = getMonthKey(entry.date);
                    if (!map[key]) {
                        map[key] = {
                            expenseOpen: 0,
                            expenseDone: 0,
                            incomeOpen: 0,
                            incomeDone: 0
                        };
                    }

                    if (config.kind === 'expense') {
                        if (entry.completed) map[key].expenseDone += entry.amount;
                        else map[key].expenseOpen += entry.amount;
                    }

                    if (config.kind === 'income') {
                        if (entry.completed) map[key].incomeDone += entry.amount;
                        else map[key].incomeOpen += entry.amount;
                    }
                });
            }

            return Object.entries(map)
                .sort((a, b) => b[0].localeCompare(a[0]));
        }

        function applyFilter(entries, filter) {
            if (filter === 'pending') return entries.filter(e => !e.completed);
            if (filter === 'completed') return entries.filter(e => e.completed);
            return entries;
        }

        function renderItem(entry, tabIndexForActions, sourceName = '') {
            const amountHtml = entry.amount != null
                ? `<div class="term-amount ${getAmountClass(entry.kind || TAB_CONFIG[tabIndexForActions].kind)}">${formatEuro(entry.amount)}</div>`
                : `<div class="term-amount sale">ohne Betrag</div>`;

            return `
                <div class="term-item ${entry.completed ? 'completed' : ''} ${isOverdue(entry.date, entry.completed) ? 'overdue' : ''}">
                    <input
                        type="checkbox"
                        class="term-checkbox"
                        ${entry.completed ? 'checked' : ''}
                        onchange="toggleCompleted(${tabIndexForActions}, ${entry.id})"
                    />
                    <div class="term-content">
                        <div class="term-top">
                            <div class="term-title">${escapeHtml(entry.title)}</div>
                            ${amountHtml}
                        </div>

                        <div class="term-meta">
                            ${formatDate(entry.date)}
                            ${isOverdue(entry.date, entry.completed) ? ' • ⚠️ Überfällig' : ''}
                        </div>

                        ${entry.note ? `<div class="term-note">${escapeHtml(entry.note)}</div>` : ''}

                        <div class="badge ${entry.completed ? 'done' : 'open'}">
                            ${entry.completed ? 'Erledigt' : 'Offen'}
                        </div>

                        ${sourceName ? `<div class="term-source">📂 ${escapeHtml(sourceName)}</div>` : ''}
                    </div>
                    <button class="term-delete" onclick="deleteEntry(${tabIndexForActions}, ${entry.id})">Löschen</button>
                </div>
            `;
        }

        function renderRegisterSummary(tabIndex) {
            const container = document.getElementById(`summary${tabIndex}`);
            const totals = getRegisterTotals(tabIndex);
            const kind = TAB_CONFIG[tabIndex].kind;
            const kindClass = kind === 'income' ? 'income' : (kind === 'sale' ? 'neutral' : 'expense');
            const amountClass = kind === 'income' ? 'income' : (kind === 'sale' ? 'sale' : 'expense');

            const note = tabIndex === 5
                ? 'Nur Einträge mit Betrag werden summiert.'
                : 'Summen enthalten offene und erledigte Posten.';

            container.innerHTML = `
                <div class="summary-card ${kindClass}">
                    <div class="summary-label">Summe offen</div>
                    <div class="summary-value ${amountClass}">${formatEuro(totals.open)}</div>
                    <div class="summary-sub">${note}</div>
                </div>
                <div class="summary-card ${kindClass}">
                    <div class="summary-label">Summe erledigt</div>
                    <div class="summary-value ${amountClass}">${formatEuro(totals.done)}</div>
                    <div class="summary-sub">Erledigte Einträge bleiben unten sichtbar.</div>
                </div>
            `;
        }

        function renderAllSummary() {
            const container = document.getElementById('summary0');
            const totals = getOverallTotals();

            const saldoOpen = totals.incomeOpen - totals.expenseOpen;
            const saldoDone = totals.incomeDone - totals.expenseDone;

            container.innerHTML = `
                <div class="summary-card expense">
                    <div class="summary-label">Ausgaben offen</div>
                    <div class="summary-value expense">${formatEuro(totals.expenseOpen)}</div>
                </div>
                <div class="summary-card expense">
                    <div class="summary-label">Ausgaben erledigt</div>
                    <div class="summary-value expense">${formatEuro(totals.expenseDone)}</div>
                </div>
                <div class="summary-card income">
                    <div class="summary-label">Einnahmen offen</div>
                    <div class="summary-value income">${formatEuro(totals.incomeOpen)}</div>
                    <div class="summary-sub">Ohne „Offene Verkäufe“</div>
                </div>
                <div class="summary-card income">
                    <div class="summary-label">Einnahmen erledigt</div>
                    <div class="summary-value income">${formatEuro(totals.incomeDone)}</div>
                    <div class="summary-sub">Ohne „Offene Verkäufe“</div>
                </div>
                <div class="summary-card neutral">
                    <div class="summary-label">Saldo offen</div>
                    <div class="summary-value ${saldoOpen >= 0 ? 'income' : 'expense'}">${formatEuro(saldoOpen)}</div>
                </div>
                <div class="summary-card neutral">
                    <div class="summary-label">Saldo erledigt</div>
                    <div class="summary-value ${saldoDone >= 0 ? 'income' : 'expense'}">${formatEuro(saldoDone)}</div>
                </div>
            `;
        }

        function renderRegisterList(tabIndex) {
            const container = document.getElementById(`termsList${tabIndex}`);
            let entries = sortEntries(getEntries(tabIndex));
            entries = applyFilter(entries, filters[tabIndex]);

            if (!entries.length) {
                container.innerHTML = `<div class="terms-empty">Keine Einträge</div>`;
                return;
            }

            container.innerHTML = entries
                .map(entry => renderItem(entry, tabIndex))
                .join('');
        }

        function renderAllList() {
            const container = document.getElementById('termsList0');
            let entries = getAllListEntries();
            entries = applyFilter(entries, filters[0]);

            if (!entries.length) {
                container.innerHTML = `<div class="terms-empty">Keine Einträge</div>`;
                return;
            }

            container.innerHTML = entries
                .map(entry => renderItem(entry, entry.sourceTab, TAB_CONFIG[entry.sourceTab].name))
                .join('');
        }

        function renderRegisterMonths(tabIndex) {
            const container = document.getElementById(`monthCards${tabIndex}`);
            const months = getRegisterMonths(tabIndex);
            const kind = TAB_CONFIG[tabIndex].kind;
            const amountClass = kind === 'income' ? 'income' : (kind === 'sale' ? 'sale' : 'expense');

            if (!months.length) {
                container.innerHTML = `<div class="month-empty">Noch keine Monatssummen vorhanden.</div>`;
                return;
            }

            container.innerHTML = months.map(([monthKey, values]) => `
                <div class="month-card">
                    <div class="month-label">${formatMonthKey(monthKey)}</div>
                    <div class="month-grid">
                        <div class="month-row">
                            <span>Offen</span>
                            <strong class="month-value ${amountClass}">${formatEuro(values.open)}</strong>
                        </div>
                        <div class="month-row">
                            <span>Erledigt</span>
                            <strong class="month-value ${amountClass}">${formatEuro(values.done)}</strong>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderAllMonths() {
            const container = document.getElementById('monthCards0');
            const months = getAllMonths();

            if (!months.length) {
                container.innerHTML = `<div class="month-empty">Noch keine Monatssummen vorhanden.</div>`;
                return;
            }

            container.innerHTML = months.map(([monthKey, values]) => {
                const saldoOpen = values.incomeOpen - values.expenseOpen;
                const saldoDone = values.incomeDone - values.expenseDone;

                return `
                    <div class="month-card">
                        <div class="month-label">${formatMonthKey(monthKey)}</div>
                        <div class="month-grid">
                            <div class="month-row">
                                <span>Ausgaben offen</span>
                                <strong class="month-value expense">${formatEuro(values.expenseOpen)}</strong>
                            </div>
                            <div class="month-row">
                                <span>Ausgaben erledigt</span>
                                <strong class="month-value expense">${formatEuro(values.expenseDone)}</strong>
                            </div>
                            <div class="month-row">
                                <span>Einnahmen offen</span>
                                <strong class="month-value income">${formatEuro(values.incomeOpen)}</strong>
                            </div>
                            <div class="month-row">
                                <span>Einnahmen erledigt</span>
                                <strong class="month-value income">${formatEuro(values.incomeDone)}</strong>
                            </div>
                            <div class="month-row">
                                <span>Saldo offen</span>
                                <strong class="month-value ${saldoOpen >= 0 ? 'income' : 'expense'}">${formatEuro(saldoOpen)}</strong>
                            </div>
                            <div class="month-row">
                                <span>Saldo erledigt</span>
                                <strong class="month-value ${saldoDone >= 0 ? 'income' : 'expense'}">${formatEuro(saldoDone)}</strong>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderEverything() {
            renderAllSummary();
            renderAllList();
            renderAllMonths();

            for (let i = 1; i <= 5; i++) {
                renderRegisterSummary(i);
                renderRegisterList(i);
                renderRegisterMonths(i);
            }
        }

        function exportToPDF() {
            const totals = getOverallTotals();
            const saldoOpen = totals.incomeOpen - totals.expenseOpen;
            const saldoDone = totals.incomeDone - totals.expenseDone;

            let html = `
                <div style="font-family: Arial, sans-serif; max-width: 850px; margin: 0 auto;">
                    <h1 style="text-align:center; color:#910c93; margin-bottom:8px;">💶 Offene Kosten</h1>
                    <p style="text-align:center; color:#666; margin-bottom:24px;">Erstellt am ${new Date().toLocaleDateString('de-DE')}</p>

                    <h2 style="color:#910c93; border-bottom:2px solid #910c93; padding-bottom:8px;">Gesamtübersicht</h2>
                    <table style="width:100%; border-collapse:collapse; margin-bottom:24px;">
                        <tr style="background:#f5f5f5;">
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">Bereich</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:right;">Betrag</th>
                        </tr>
                        <tr><td style="padding:10px; border:1px solid #ddd;">Ausgaben offen</td><td style="padding:10px; border:1px solid #ddd; text-align:right;">${formatEuro(totals.expenseOpen)}</td></tr>
                        <tr><td style="padding:10px; border:1px solid #ddd;">Ausgaben erledigt</td><td style="padding:10px; border:1px solid #ddd; text-align:right;">${formatEuro(totals.expenseDone)}</td></tr>
                        <tr><td style="padding:10px; border:1px solid #ddd;">Einnahmen offen (ohne Offene Verkäufe)</td><td style="padding:10px; border:1px solid #ddd; text-align:right;">${formatEuro(totals.incomeOpen)}</td></tr>
                        <tr><td style="padding:10px; border:1px solid #ddd;">Einnahmen erledigt (ohne Offene Verkäufe)</td><td style="padding:10px; border:1px solid #ddd; text-align:right;">${formatEuro(totals.incomeDone)}</td></tr>
                        <tr><td style="padding:10px; border:1px solid #ddd;"><strong>Saldo offen</strong></td><td style="padding:10px; border:1px solid #ddd; text-align:right;"><strong>${formatEuro(saldoOpen)}</strong></td></tr>
                        <tr><td style="padding:10px; border:1px solid #ddd;"><strong>Saldo erledigt</strong></td><td style="padding:10px; border:1px solid #ddd; text-align:right;"><strong>${formatEuro(saldoDone)}</strong></td></tr>
                    </table>
            `;

            for (let i = 1; i <= 5; i++) {
                const config = TAB_CONFIG[i];
                const totalsRegister = getRegisterTotals(i);
                const entries = sortEntries(getEntries(i));

                html += `
                    <h2 style="color:#910c93; border-bottom:2px solid #910c93; padding-bottom:8px; margin-top:26px;">${config.name}</h2>
                    <p style="margin:8px 0 14px; color:#444;">
                        <strong>Offen:</strong> ${formatEuro(totalsRegister.open)} &nbsp;&nbsp; | &nbsp;&nbsp;
                        <strong>Erledigt:</strong> ${formatEuro(totalsRegister.done)}
                        ${i === 5 ? '<br><small>Nur Einträge mit Betrag werden summiert. Nicht in Gesamteinnahmen enthalten.</small>' : ''}
                    </p>
                `;

                if (!entries.length) {
                    html += `<p style="color:#777;">Keine Einträge vorhanden.</p>`;
                    continue;
                }

                html += `
                    <table style="width:100%; border-collapse:collapse; margin-bottom:20px;">
                        <tr style="background:#f5f5f5;">
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">Status</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">Fällig</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">Bezeichnung</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:right;">Betrag</th>
                            <th style="padding:10px; border:1px solid #ddd; text-align:left;">Notiz</th>
                        </tr>
                `;

                entries.forEach(entry => {
                    html += `
                        <tr>
                            <td style="padding:10px; border:1px solid #ddd;">${entry.completed ? 'Erledigt' : 'Offen'}</td>
                            <td style="padding:10px; border:1px solid #ddd;">${formatDate(entry.date)}</td>
                            <td style="padding:10px; border:1px solid #ddd;">${escapeHtml(entry.title)}</td>
                            <td style="padding:10px; border:1px solid #ddd; text-align:right;">${entry.amount != null ? formatEuro(entry.amount) : '—'}</td>
                            <td style="padding:10px; border:1px solid #ddd;">${entry.note ? escapeHtml(entry.note) : '—'}</td>
                        </tr>
                    `;
                });

                html += `</table>`;
            }

            html += `
                    <div style="margin-top:24px; padding-top:14px; border-top:1px solid #ddd; color:#888; font-size:12px;">
                        Export aus der App „Offene Kosten“
                    </div>
                </div>
            `;

            html2pdf().set({
                margin: 10,
                filename: `Offene-Kosten-${new Date().toLocaleDateString('de-DE')}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            }).from(html).save();
        }

        function init() {
            renderEverything();
            updateFab();
        }

        init();
    </script>
</body>
</html>
